<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parena Trade B2B - Giriş</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .gradient-bg { 
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); 
    }
    .card-shadow { 
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    .login-container { 
      min-height: 650px; 
      display: flex; 
      flex-direction: column; 
    }
    .form-section { 
      display: none; 
      opacity: 0; 
      transition: opacity 0.3s ease; 
    }
    .form-section.active { 
      display: block; 
      opacity: 1; 
    }
    .input-focus:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
    .btn-loading {
      position: relative;
      color: transparent;
    }
    .btn-loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin: -10px 0 0 -10px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .language-select {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .language-select:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .language-select option {
      background: #1e293b;
      color: white;
    }
    .role-select {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 8px;
    }
    .role-option {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .role-option:hover {
      border-color: #6366f1;
      transform: translateY(-2px);
    }
    .role-option.selected {
      border-color: #6366f1;
      background-color: #eef2ff;
    }
    .role-icon {
      font-size: 20px;
      margin-bottom: 8px;
      color: #6366f1;
    }
    .role-name {
      font-size: 14px;
      font-weight: 500;
    }
    .custom-role-input {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-xl card-shadow w-full max-w-md overflow-hidden login-container">
    <!-- Üst Bilgi ve Dil Seçimi -->
    <div class="flex justify-between items-center p-4 border-b">
      <div class="flex items-center">
        <div class="bg-indigo-600 w-10 h-10 rounded-lg flex items-center justify-center mr-3">
          <i class="fas fa-globe-americas text-white"></i>
        </div>
        <h1 class="text-lg font-bold text-gray-800">Parena Trade</h1>
      </div>
      <div class="flex items-center space-x-2">
        <i class="fas fa-language text-gray-500"></i>
        <select id="languageSelect" class="language-select text-xs">
          <option value="tr">Türkçe</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="it">Italiano</option>
          <option value="zh">中文</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
        </select>
      </div>
    </div>

    <!-- 🔹 Giriş Formu -->
    <div id="loginSection" class="form-section active p-8">
      <div class="text-center mb-8">
        <div class="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-lock text-indigo-600 text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Hoş Geldiniz</h1>
        <p class="text-gray-600 mt-2">Yönetim Paneline erişmek için giriş yapın</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-posta</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-envelope text-gray-400"></i>
            </div>
            <input type="email" id="email" required
              class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
              placeholder="ornek@email.com">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input type="password" id="password" required
              class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
              placeholder="Şifreniz">
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
              <button type="button" id="togglePassword" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input type="checkbox" id="remember" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
            <label for="remember" class="ml-2 block text-sm text-gray-700">Beni hatırla</label>
          </div>
          <a href="#" id="forgotPassword" class="text-sm text-indigo-600 hover:text-indigo-500 transition-colors">Şifremi unuttum</a>
        </div>

        <button type="submit" id="loginButton"
          class="w-full bg-indigo-600 text-white py-3 px-4 rounded-lg hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 flex items-center justify-center transition-all duration-200 transform hover:-translate-y-0.5 shadow-md hover:shadow-lg">
          <i class="fas fa-sign-in-alt mr-2"></i> Giriş Yap
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          Hesabınız yok mu?
          <a href="#" id="showRegister" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">Kayıt Ol</a>
        </p>
      </div>
    </div>

    <!-- 🔹 Kayıt Formu -->
    <div id="registerSection" class="form-section p-8 bg-gray-50">
      <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-gray-800">Yeni Hesap Oluştur</h2>
        <p class="text-sm text-gray-600 mt-1">Lütfen bilgileri doldurun</p>
      </div>

      <form id="registerForm" class="space-y-4">
        <div>
          <label for="regName" class="block text-sm font-medium text-gray-700 mb-1">Ad Soyad</label>
          <input type="text" id="regName" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
            placeholder="Adınız ve soyadınız">
        </div>

        <div>
          <label for="regEmail" class="block text-sm font-medium text-gray-700 mb-1">E-posta</label>
          <input type="email" id="regEmail" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
            placeholder="ornek@email.com">
        </div>

        <!-- Rol Seçimi -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Rolünüz</label>
          <div class="role-select" id="roleSelector">
            <div class="role-option" data-role="seller">
              <i class="fas fa-store role-icon"></i>
              <span class="role-name">Satıcı</span>
            </div>
            <div class="role-option" data-role="buyer">
              <i class="fas fa-shopping-cart role-icon"></i>
              <span class="role-name">Alıcı</span>
            </div>
            <div class="role-option" data-role="consultants">
              <i class="fas fa-user-tie role-icon"></i>
              <span class="role-name">Danışman</span>
            </div>
            <div class="role-option" data-role="logistics">
              <i class="fas fa-truck role-icon"></i>
              <span class="role-name">Lojistik</span>
            </div>
            <div class="role-option" data-role="custom">
              <i class="fas fa-cog role-icon"></i>
              <span class="role-name">Özel</span>
            </div>
          </div>
          <input type="hidden" id="selectedRole" name="role" required>
          <div id="customRoleInput" class="custom-role-input">
            <input type="text" id="customRole" 
              class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus transition-all duration-200"
              placeholder="Özel rolünüzü belirtin">
          </div>
        </div>

        <div>
          <label for="regPassword" class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
          <input type="password" id="regPassword" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
            placeholder="En az 6 karakter">
        </div>

        <div>
          <label for="regPasswordConfirm" class="block text-sm font-medium text-gray-700 mb-1">Şifre Tekrar</label>
          <input type="password" id="regPasswordConfirm" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
            placeholder="Şifrenizi tekrar girin">
        </div>

        <div class="flex items-center">
          <input type="checkbox" id="terms" required
            class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
          <label for="terms" class="ml-2 block text-sm text-gray-700">
            <a href="#" class="text-indigo-600 hover:text-indigo-500 transition-colors">Kullanım koşullarını</a> kabul ediyorum
          </label>
        </div>

        <div class="flex space-x-4 pt-2">
          <button type="button" id="backToLogin"
            class="w-1/3 bg-gray-300 text-gray-700 py-2 px-4 rounded-lg hover:bg-gray-400 transition-colors flex items-center justify-center">
            <i class="fas fa-arrow-left mr-1"></i> Geri
          </button>
          <button type="submit" id="registerButton"
            class="flex-1 bg-indigo-600 text-white py-2 px-4 rounded-lg hover:bg-indigo-700 flex items-center justify-center transition-colors shadow-md hover:shadow-lg">
            <i class="fas fa-user-plus mr-2"></i> Kayıt Ol
          </button>
        </div>
      </form>
    </div>

 <!-- Mesaj Gösterme Alanı -->
    <div id="messageBox" class="hidden mx-4 mb-4 p-4 rounded-lg text-white text-center"></div>
  </div>


    <!-- 🔹 Şifre Resetleme Formu -->
    <div id="resetSection" class="form-section p-8 bg-gray-50">
      <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-gray-800">Yeni Şifre Belirle</h2>
        <p class="text-sm text-gray-600 mt-1">Yeni şifrenizi girin</p>
      </div>
      <form id="resetForm" class="space-y-4">
        <div>
          <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">Yeni Şifre</label>
          <input type="password" id="newPassword" required class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200" placeholder="Yeni şifrenizi girin">
        </div>
        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Şifre Tekrar</label>
          <input type="password" id="confirmPassword" required class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200" placeholder="Yeni şifrenizi tekrar girin">
        </div>
        <button type="submit" id="resetButton" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-lg hover:bg-indigo-700 flex items-center justify-center transition-colors shadow-md hover:shadow-lg">
          <i class="fas fa-key mr-2"></i> Şifreyi Güncelle
        </button>
      </form>
    </div>

   
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 🔹 Supabase bağlantı bilgileri (Excel'den alınan)
    const supabaseUrl = "https://xliutvspwodhoaxvysks.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsaXV0dnNwd29kaG9heHZ5c2tzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTgyOTksImV4cCI6MjA3MjkzNDI5OX0.Zodisa_ifP8t2Q4X0ecnB56RiR_Bg4QS5gvPn5ZLK_w";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // DOM Elementleri
    const loginSection = document.getElementById("loginSection");
    const registerSection = document.getElementById("registerSection");
    const messageBox = document.getElementById("messageBox");
    const loginButton = document.getElementById("loginButton");
    const registerButton = document.getElementById("registerButton");
    const togglePasswordBtn = document.getElementById("togglePassword");
    const roleOptions = document.querySelectorAll('.role-option');
    const selectedRoleInput = document.getElementById('selectedRole');
    const customRoleInput = document.getElementById('customRoleInput');
    const customRoleField = document.getElementById('customRole');

    // Form geçişleri
    document.getElementById("showRegister").addEventListener("click", (e) => {
      e.preventDefault();
      loginSection.classList.remove("active");
      registerSection.classList.add("active");
    });
    
    document.getElementById("backToLogin").addEventListener("click", () => {
      registerSection.classList.remove("active");
      loginSection.classList.add("active");
    });

    // Şifre görünürlüğünü değiştirme
    togglePasswordBtn.addEventListener("click", () => {
      const passwordInput = document.getElementById("password");
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      togglePasswordBtn.innerHTML = type === "password" ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });

    // Rol seçimi işlemleri
    roleOptions.forEach(option => {
      option.addEventListener('click', () => {
        // Tüm seçeneklerden seçili class'ını kaldır
        roleOptions.forEach(opt => opt.classList.remove('selected'));
        
        // Tıklanan seçeneğe seçili class'ını ekle
        option.classList.add('selected');
        
        // Seçilen rolü hidden input'a ata
        const selectedRole = option.getAttribute('data-role');
        selectedRoleInput.value = selectedRole;
        
        // Eğer özel rol seçildiyse, özel rol input'unu göster
        if (selectedRole === 'custom') {
          customRoleInput.style.display = 'block';
          customRoleField.setAttribute('required', 'true');
        } else {
          customRoleInput.style.display = 'none';
          customRoleField.removeAttribute('required');
        }
      });
    });

    // Mesaj gösterme fonksiyonu
    function showMessage(message, type = "error") {
      messageBox.className = `mx-4 mb-4 p-4 rounded-lg text-white text-center ${type === "error" ? "bg-red-500" : "bg-green-500"}`;
      messageBox.textContent = message;
      messageBox.classList.remove("hidden");
      
      setTimeout(() => {
        messageBox.classList.add("hidden");
      }, 5000);
    }

    // 🔹 Giriş işlemi
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const rememberMe = document.getElementById("remember").checked;

      // Buton durumunu güncelle
      loginButton.classList.add("btn-loading");

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ 
          email, 
          password 
        });

        if (error) {
          showMessage("Giriş başarısız: " + error.message);
          loginButton.classList.remove("btn-loading");
          return;
        }

        showMessage("Giriş başarılı! Yönlendiriliyorsunuz...", "success");
        
        // Kullanıcı bilgilerini localStorage'a kaydet (isteğe bağlı)
        if (rememberMe) {
          localStorage.setItem("userEmail", email);
        }
        
        // 2 saniye sonra yönlendirme
        setTimeout(() => {
          window.location.href = "admin/admin.html";
        }, 2000);
        
      } catch (error) {
        showMessage("Beklenmeyen bir hata oluştu: " + error.message);
        loginButton.classList.remove("btn-loading");
      }
    });

    // 🔹 Kayıt işlemi
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("regName").value;
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;
  const confirm = document.getElementById("regPasswordConfirm").value;
  let role = selectedRoleInput.value;

  // Özel rol seçildiyse, input değerini al
  if (role === 'custom') {
    role = customRoleField.value;
    if (!role) {
      showMessage("Lütfen özel rolünüzü belirtin!");
      return;
    }
  }

  // Rol seçilmemişse hata ver
  if (!role) {
    showMessage("Lütfen bir rol seçin!");
    return;
  }

  if (password !== confirm) {
    showMessage("Şifreler eşleşmiyor!");
    return;
  }

  registerButton.classList.add("btn-loading");

  try {
    // 1) Auth'a kayıt
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name } // metadata
      }
    });

    if (error) {
      showMessage("Kayıt başarısız: " + error.message);
      registerButton.classList.remove("btn-loading");
      return;
    }

    const user = data.user;

    // 2) Profiles tablosuna ekleme
    if (user) {
      const { error: insertError } = await supabase.from("profiles").insert([{
        id: user.id,          // Auth UID
        email: email,
        full_name: name,
        role: role,
        phone: null,
        confirm: false,
        status: "Active",
        created_at: new Date().toISOString()
      }]);

      if (insertError) {
        console.error("Profiles insert hatası:", insertError);
        showMessage("Kullanıcı profili eklenirken hata oluştu!");
      }
    }

    // 3) Başarılı kayıt mesajı
    showMessage("Kayıt başarılı! Email onayı yapmalısınız.", "success");

    // 2 saniye sonra login ekranına dön
    setTimeout(() => {
      registerSection.classList.remove("active");
      loginSection.classList.add("active");
    }, 2000);

  } catch (err) {
    showMessage("Beklenmeyen bir hata oluştu: " + err.message);
  } finally {
    registerButton.classList.remove("btn-loading");
  }
});
    // 🔹 Şifre sıfırlama
    document.getElementById("forgotPassword").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = prompt("Şifre sıfırlama için e-posta adresinizi girin:");
      
      if (!email) return;
      
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + "/login.html"
        });
        
        if (error) {
          showMessage("Şifre sıfırlama başarısız: " + error.message);
        } else {
          showMessage("Şifre sıfırlama e-postası gönderildi!", "success");
        }
      } catch (error) {
        showMessage("Beklenmeyen bir hata oluştu: " + error.message);
      }
    });

    const loginSection = document.getElementById("loginSection");
    const registerSection = document.getElementById("registerSection");
    const resetSection = document.getElementById("resetSection");
    const messageBox = document.getElementById("messageBox");

    // ✅ Reset akışı kontrolü
    document.addEventListener("DOMContentLoaded", () => {
      if (window.location.hash.includes("type=recovery")) {
        loginSection.classList.remove("active");
        registerSection.classList.remove("active");
        resetSection.classList.add("active");
      }
    });

    // ✅ Şifre güncelleme
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (newPassword !== confirmPassword) {
        showMessage("Şifreler eşleşmiyor!");
        return;
      }

      const { error } = await supabase.auth.updateUser({ password: newPassword });
      if (error) {
        showMessage("Şifre güncellenemedi: " + error.message);
        return;
      }

      showMessage("Şifre başarıyla güncellendi. Giriş yapabilirsiniz.", "success");
      setTimeout(() => {
        resetSection.classList.remove("active");
        loginSection.classList.add("active");
      }, 2000);
    });

    function showMessage(message, type="error") {
      messageBox.className = `mx-4 mb-4 p-4 rounded-lg text-white text-center ${type === "error" ? "bg-red-500" : "bg-green-500"}`;
      messageBox.textContent = message;
      messageBox.classList.remove("hidden");
      setTimeout(() => messageBox.classList.add("hidden"), 5000);
    }

    // Sayfa yüklendiğinde e-posta bilgisini hatırla
    document.addEventListener('DOMContentLoaded', () => {
      const savedEmail = localStorage.getItem("userEmail");
      if (savedEmail) {
        document.getElementById("email").value = savedEmail;
        document.getElementById("remember").checked = true;
      }
    });
  </script>
</body>
</html>
