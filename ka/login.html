<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Sesli Sipariş</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #003dff;
            --secondary: #00c2ff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --gray: #6c757d;
            --border: #e1e5e9;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .auth-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .auth-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            opacity: 0.9;
        }
        
        .auth-body {
            padding: 30px;
        }
        
        .login-type-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        
        .login-type-btn {
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        
        .login-type-btn:hover {
            border-color: var(--primary);
        }
        
        .login-type-btn.selected {
            border-color: var(--primary);
            background: #f0f7ff;
            box-shadow: 0 5px 15px rgba(0, 61, 255, 0.1);
        }
        
        .login-type-icon {
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--primary);
        }
        
        .login-type-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .login-type-desc {
            font-size: 12px;
            color: var(--gray);
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 61, 255, 0.1);
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #002cc8;
            transform: translateY(-2px);
        }
        
        .btn-block {
            width: 100%;
        }
        
        .btn-secondary {
            background: var(--gray);
            color: white;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .text-center {
            text-align: center;
        }
        
        .mt-3 {
            margin-top: 15px;
        }
        
        .text-muted {
            color: var(--gray);
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        
        .modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .modal-header h3 {
            margin: 0;
            color: var(--dark);
        }
        
        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        .role-option {
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        
        .role-option:hover {
            border-color: var(--primary);
        }
        
        .role-option.selected {
            border-color: var(--primary);
            background: #f0f7ff;
            box-shadow: 0 5px 15px rgba(0, 61, 255, 0.1);
        }
        
        .role-icon {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--primary);
        }
        
        .role-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn-sm {
            padding: 8px 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1><i class="fas fa-utensils"></i> Sesli Sipariş</h1>
            <p>Hesabınıza giriş yapın</p>
        </div>
        
        <div class="auth-body">
            <div id="authAlert" class="alert"></div>
            
            <!-- Giriş Türü Seçimi -->
            <div class="login-type-selection">
                <div class="login-type-btn selected" data-type="staff">
                    <div class="login-type-icon">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div class="login-type-name">Personel Girişi</div>
                    <div class="login-type-desc">Satıcı & Kurye</div>
                </div>
                <div class="login-type-btn" data-type="customer">
                    <div class="login-type-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="login-type-name">Müşteri Girişi</div>
                    <div class="login-type-desc">Telefon ile</div>
                </div>
            </div>
            
            <!-- Personel Giriş Formu (Email/Şifre) -->
            <form id="staffLoginForm" class="login-form active">
                <div class="form-group">
                    <label for="staffEmail">E-posta</label>
                    <input type="email" id="staffEmail" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="staffPassword">Şifre</label>
                    <input type="password" id="staffPassword" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Personel Girişi
                </button>
                
                <div class="text-center mt-3">
                    <a href="#" id="showStaffRegister">Personel kaydı oluştur</a>
                </div>
            </form>
            
            <!-- Müşteri Giriş Formu (Telefon) -->
            <form id="customerLoginForm" class="login-form">
                <div class="form-group">
                    <label for="customerPhone">Telefon Numarası</label>
                    <input type="tel" id="customerPhone" class="form-control" placeholder="5xx xxx xx xx" required>
                </div>
                
                <div class="form-group">
                    <label for="customerName">Adınız (Opsiyonel)</label>
                    <input type="text" id="customerName" class="form-control" placeholder="İsim soyisim">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-mobile-alt"></i> Telefon ile Giriş
                </button>
                
                <div class="text-center mt-3">
                    <small class="text-muted">Telefon numaranız ile hızlı giriş yapabilirsiniz</small>
                </div>
            </form>
        </div>
    </div>

    <!-- Personel Kayıt Modalı -->
    <div id="staffRegisterModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Personel Kaydı</h3>
                <button class="btn btn-sm btn-secondary" onclick="closeStaffRegister()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="staffRegisterForm">
                <div class="form-group">
                    <label for="regFullName">Ad Soyad *</label>
                    <input type="text" id="regFullName" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">E-posta *</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="regPhone">Telefon *</label>
                    <input type="tel" id="regPhone" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Şifre *</label>
                    <input type="password" id="regPassword" class="form-control" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label>Personel Türü *</label>
                    <div class="role-selection">
                        <div class="role-option" data-role="seller">
                            <div class="role-icon"><i class="fas fa-store"></i></div>
                            <div class="role-name">Satıcı</div>
                        </div>
                        <div class="role-option" data-role="courier">
                            <div class="role-icon"><i class="fas fa-motorcycle"></i></div>
                            <div class="role-name">Kurye</div>
                        </div>
                    </div>
                    <input type="hidden" id="selectedRole" required>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeStaffRegister()">İptal</button>
                    <button type="submit" class="btn btn-primary">Kayıt Oluştur</button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth-system.js"></script>
</body>
</html>
